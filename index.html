
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3b82f6" />
    <title>BudgetFlow - Personal Finance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'brand-dark': '#0f172a',
              'brand-surface': '#1e293b',
              'brand-primary': '#3b82f6',
              'brand-secondary': '#06b6d4',
              'brand-accent': '#f43f5e',
              'brand-green': '#10b981',
              'brand-yellow': '#f59e0b',
            },
            animation: {
              'scale-in-out': 'scale-in-out 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards',
              'fade-in-delayed': 'fade-in-delayed 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards',
            },
            keyframes: {
              'scale-in-out': {
                '0%': { transform: 'scale(0.8)', opacity: '0' },
                '100%': { transform: 'scale(1)', opacity: '1' },
              },
              'fade-in-delayed': {
                '0%, 40%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
            },
          },
        },
      }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script type="importmap">

    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.546.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.3.0",
    "@google/genai": "https://esm.run/@google/genai"
  }
}
</script>
